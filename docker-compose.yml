version: '3.8'

# Define the services required to deploy the Twitch recorder.
services:
  twitch_recorder:
    build: .
    container_name: twitch_recorder
    restart: unless-stopped

    network_mode: host
    devices:
            - /dev/dri:/dev/dri
    # Load environment variables from the .env file and pass them into the container.
    env_file:
      - twitch-recorder.env  
    environment:
      - TWITCH_SECRET=${TWITCH_SECRET}
      - Twitch_auth_token=${Twitch_auth_token}
      - Twitch_client_id=${Twitch_client_id}

    # Mount a host directory to preserve recorded VOD content outside the container.
    volumes:
      - /volume1/VOD/recordings/:/VOD/recordings/