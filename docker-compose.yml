version: '3.8'

# Define the application services for the Twitch recorder deployment.
services:
  twitch_recorder:
    build: .
    container_name: twitch_recorder
    restart: unless-stopped

    network_mode: host

    # Expose the recorder service port for local access.
    ports:
      - "8080:8080"

    # Environment variables are loaded from the .env file and passed into the container.
    env_file:
      - .env  
    environment:
      - TWITCH_SECRET=${TWITCH_SECRET}
      - Twitch_auth_token=${Twitch_auth_token}
      - Twitch_client_id=${Twitch_client_id}

    # Mount a host directory to persist downloaded VOD content outside the container.
    volumes:
      - /volume1/VOD/recordings/:/VOD/recordings/