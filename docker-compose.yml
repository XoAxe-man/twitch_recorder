version: '3.8'

# Twitch recording service definition.
services:
  twitch_recorder:
    build: .
    container_name: twitch_recorder
    restart: unless-stopped

    network_mode: host
    devices:
      - /dev/dri:/dev/dri
    # Load environment secrets.
    env_file:
      - twitch-recorder.env  
    environment:
      - TWITCH_SECRET=${TWITCH_SECRET}
      - Twitch_auth_token=${Twitch_auth_token}
      - Twitch_client_id=${Twitch_client_id}

    # Mount volumes for VOD recordings and logs.
    volumes:
      - /volume1/VOD/recordings/:/VOD/recordings/:rw
      - /volume1/VOD/logs/:/VOD/logs:rw